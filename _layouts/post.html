<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    {% seo %}
    
    <!-- 仅添加了 typography 插件 -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@700&family=Noto+Sans+SC:wght@400;500&display=swap');
        
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .serif { font-family: 'Noto Serif SC', serif; }

        /* 针对 prose 的细微调整，确保顶部没有多余间距 */
        .prose h1:first-child, 
        .prose p:first-child { 
            margin-top: 0 !important; 
        }

        /* 自定义浅色背景色调 */
        .bg-soft-green { background-color: #f0f9f4; }
        .dark .bg-soft-green { background-color: #111827; }
    </style>
</head>
<body class="bg-soft-green dark:bg-[#0a0a0a] text-gray-800 dark:text-gray-200 min-h-screen">

    <!-- 顶部导航 -->
    <nav class="fixed w-full z-40 bg-white/70 dark:bg-black/70 backdrop-blur-md border-b border-green-100/50 dark:border-white/5">
        <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center space-x-2 text-green-800 dark:text-green-400 font-bold group">
                <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
                <span class="serif">我什么都读</span>
            </a>
            
            <button id="themeToggle" class="p-2.5 rounded-xl bg-white/50 dark:bg-white/5 hover:bg-green-100 dark:hover:bg-white/10 transition-all border border-green-100 dark:border-white/10">
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block text-yellow-400"></i>
                <i data-lucide="moon" class="w-5 h-5 block dark:hidden text-green-700"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 pt-32 pb-24">
        <!-- 文章页头部 -->
        <header class="mb-12 text-center">
            {% if page.date %}
            <time class="text-sm font-medium text-green-600 dark:text-green-500/80 tracking-widest uppercase mb-4 block">
                {{ page.date | date: "%Y年%m月%d日" }}
            </time>
            {% endif %}
            <h1 class="text-3xl md:text-4xl font-bold serif text-gray-900 dark:text-white mb-6 leading-tight">
                {{ page.title }}
            </h1>
            <div class="h-1 w-12 bg-green-500/30 mx-auto rounded-full"></div>
        </header>

        <!-- 文章主体内容：注入 prose 排版类 -->
        <article class="prose prose-slate lg:prose-lg dark:prose-invert max-w-none">
            {{ content }}
        </article>

        <!-- 页脚 -->
        <footer class="mt-20 pt-12 border-t border-green-100 dark:border-white/5 text-center">
            <div class="flex items-center justify-center space-x-3 mb-6">
                <div class="h-[1px] w-12 bg-green-200 dark:bg-green-900"></div>
                <div class="text-green-600 dark:text-green-500"><i data-lucide="leaf" class="w-4 h-4"></i></div>
                <div class="h-[1px] w-12 bg-green-200 dark:bg-green-900"></div>
            </div>
            
            <div class="space-y-2">
                <p class="text-gray-500 dark:text-gray-400 font-medium">
                    © {{ "now" | date: "%Y" }} <span class="text-green-700 dark:text-green-400">我什么都读™</span> 的个人日志
                </p>
                <p class="text-gray-400 dark:text-gray-600 text-xs tracking-wider uppercase">
                    All Rights Reserved.
                </p>
                <p class="text-xs mt-4 text-green-600/60 dark:text-green-400/40 font-medium italic">
                    “记录成长，说点梦话，保持对世界的好奇心”
                </p>
            </div>
        </footer>
    </main>

    <script>
        // 初始化 Lucide 图标
        lucide.createIcons();

        // 暗黑模式切换逻辑
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>
</body>
</html>
